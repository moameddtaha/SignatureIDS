services:
  worker:
    build:
      context: .
      dockerfile: SignatureIDS.Worker/Dockerfile
    image: signatureids-worker:latest
    network_mode: host
    cap_add:
      - NET_ADMIN
      - NET_RAW
    env_file: .env
    restart: unless-stopped
    depends_on:
      mongodb:
        condition: service_healthy
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  mongodb:
    image: mongo:6
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: SignatureIDS
    ports:
      - "127.0.0.1:27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

volumes:
  mongo_data:
